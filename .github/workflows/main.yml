name: Build Mod
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.10 # Указываем современную версию для 1.21.4

      - name: Build with Gradle
        run: gradle build
        
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Warden-Mod-Jar
          path: build/libs/*.jar
